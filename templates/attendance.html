<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng điểm danh</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            font-size: 18px;
        }
        th, td {
            text-align: center;
            padding: 12px;
        }
        th {
            background-color: #f2f2f2;
        }
        .btn-danger {
            padding: 4px 12px;
        }
    </style>
</head>
<body class="container mt-4">
    <h2>Lịch sử điểm danh</h2>

    {% if records %}
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Time</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            {% for row in records %}
            <tr>
                <td>{{ row['Name'] }}</td>
                <td>{{ row['Time'] }}</td>
                <td>
                    <form method="POST" action="{{ url_for('delete_record') }}">
                        <input type="hidden" name="name" value="{{ row['Name'] }}">
                        <input type="hidden" name="time" value="{{ row['Time'] }}">
                        <button type="submit" class="btn btn-danger btn-sm">Xoá</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p class="text-center">Chưa có dữ liệu điểm danh.</p>
    {% endif %}

    <div class="mt-4 text-center">
        <a href="/" class="btn btn-secondary">Quay lại trang chính</a>
    </div>
</body>
</html>
